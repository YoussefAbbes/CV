<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Youssef Abbes</title>
  <link rel="icon" type="image/svg+xml" href="/CV/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #050510;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 500px; }
    .code {
      font-family: 'Space Mono', monospace;
      font-size: 8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #7c3aed, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 12px; color: #fff; }
    p { color: #a0a0b0; margin-bottom: 32px; line-height: 1.6; }
    .btn {
      display: inline-block;
      padding: 14px 40px;
      border-radius: 50px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #7c3aed, #00d4ff);
      text-decoration: none;
      transition: box-shadow 0.3s;
    }
    .btn:hover {
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>Looks like you've wandered into uncharted territory. The page you're looking for doesn't exist or has been moved.</p>
    <a href="/CV/" class="btn">Back to Portfolio</a>
  </div>
</body>
</html>
